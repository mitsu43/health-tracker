name = "health-tracker"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
GEMINI_MODEL = "gemini-2.5-flash"

# 静的ファイルをWorker Assetsから配信
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# D1データベースのバインディング
[[d1_databases]]
binding = "DB"
database_name = "health-tracker-db"
database_id = "a8612e98-62a7-4d35-aa94-59e84a829643"
