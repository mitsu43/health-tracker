<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>資格学習スケジュール</title>
<style>
:root{--bg:#f4f6f2;--panel:#fff;--text:#243028;--muted:#66736a;--line:#d9e0da;--green:#3f6b45;--green2:#e8f1e9;--red:#a64235;--shadow:0 5px 18px rgba(29,48,34,.07)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Noto Sans JP","Yu Gothic UI",sans-serif}
button,input,textarea{font:inherit}
.top{background:var(--panel);border-bottom:1px solid var(--line);padding:13px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.back{color:var(--green);text-decoration:none;font-weight:700}
.top h1{font-size:18px;margin:0}
.wrap{max-width:1180px;margin:0 auto;padding:20px}
.toolbar{display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:700;color:var(--muted)}
input,textarea{border:1px solid var(--line);border-radius:7px;background:#fff;padding:9px 10px;color:var(--text)}
input[type=date]{min-height:42px}
.btn{border:1px solid var(--line);border-radius:7px;background:#fff;padding:9px 13px;cursor:pointer;font-weight:700}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(360px,1.25fr);gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:17px;margin-bottom:16px}
.card h2{font-size:15px;margin:0 0 10px}
.sub{font-size:12px;color:var(--muted);line-height:1.65}
.date-title{display:flex;justify-content:space-between;gap:12px;align-items:start}
.badge{font-size:11px;padding:4px 9px;border-radius:999px;background:var(--green2);color:var(--green);font-weight:700}
.task{display:grid;grid-template-columns:22px minmax(0,1fr) auto;gap:10px;padding:11px 0;border-top:1px solid var(--line);cursor:pointer}
.task:first-of-type{border-top:none}
.task input{margin-top:3px}
.task b{display:block;font-size:14px}
.task span{display:block;font-size:12px;color:var(--muted);margin-top:3px}
.time{font-size:12px;font-weight:700;color:var(--green)}
.progress{height:7px;background:#e7ebe7;border-radius:5px;overflow:hidden;margin:10px 0}
.bar{height:100%;background:var(--green);transition:width .2s}
.viewer{aspect-ratio:16/10;border:1px solid var(--line);border-radius:7px;background:#eef1ee;overflow:hidden;display:flex;align-items:center;justify-content:center}
.viewer iframe{width:100%;height:100%;border:0}
.empty{text-align:center;padding:25px;color:var(--muted);font-size:13px;line-height:1.7}
.material-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}
.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 10px;font-size:12px;cursor:pointer}
.tab.active{background:var(--green);border-color:var(--green);color:#fff}
details{margin-top:16px}
summary{cursor:pointer;font-weight:700;font-size:13px}
.settings{margin-top:12px}
.settings textarea{width:100%;min-height:145px;font-family:Consolas,monospace;font-size:12px;line-height:1.6}
.hint{font-size:11px;color:var(--muted);line-height:1.6;margin-top:6px}
.status{font-size:12px;color:var(--green);min-height:18px}
.warning{color:var(--red)}
.lecture-tools{margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
.lecture-tools textarea{width:100%;min-height:150px;line-height:1.7}
.lecture-actions{display:flex;gap:8px;flex-wrap:wrap;margin:9px 0}
.exam-summary{white-space:pre-wrap;background:#f5f8f5;border:1px solid var(--line);border-radius:7px;padding:18px;font-size:15px;line-height:1.9;min-height:260px}
.study-actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.pdf-card{margin-top:16px}
.setup-details{margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
.upload-box{border:2px dashed #b9c7bb;border-radius:8px;padding:18px;text-align:center;background:#f8faf8;cursor:pointer;margin-top:12px}
.upload-box:hover{border-color:var(--green);background:var(--green2)}
.upload-list{margin-top:12px}
.upload-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.upload-item-name{flex:1;min-width:0;font-size:12px;overflow-wrap:anywhere}
.upload-item button{border:0;background:none;color:var(--red);cursor:pointer}
@media(max-width:850px){.wrap{padding:14px}.grid{grid-template-columns:1fr}.top{padding:12px 14px}.viewer{aspect-ratio:4/3}}
</style>
</head>
<body>
<header class="top">
  <a class="back" href="index.html">← 健康管理へ</a>
  <h1>測量士補・土地家屋調査士 学習ページ</h1>
</header>
<main class="wrap">
  <div class="toolbar">
    <div class="field"><label for="study-date">対象日</label><input type="date" id="study-date"></div>
    <button class="btn" type="button" onclick="moveDate(-1)">前日</button>
    <button class="btn" type="button" onclick="selectToday()">今日</button>
    <button class="btn" type="button" onclick="moveDate(1)">翌日</button>
    <span id="sync-status" class="status"></span>
  </div>
  <div class="grid">
    <section>
      <div class="card" id="schedule-card"></div>
      <div class="card">
        <h2>学習記録</h2>
        <div class="field">
          <label for="study-note">理解した点・間違えた点</label>
          <textarea id="study-note" rows="6" placeholder="例：水準測量の標尺補正を取り違えた。公式と単位を再確認する。"></textarea>
        </div>
        <button class="btn primary" type="button" onclick="saveNote()" style="margin-top:10px">記録を保存</button>
      </div>
    </section>
    <section>
      <div class="card">
        <div class="date-title">
          <div><h2>今日の試験要点</h2><div class="sub" id="viewer-caption">講義を選ぶと、問われる点だけを表示します。</div></div>
          <span class="badge" id="material-count">0講義</span>
        </div>
        <div class="material-tabs" id="material-tabs"></div>
        <div class="lecture-tools" id="lecture-tools">
          <h2 id="lecture-tools-title">本日の要点</h2>
          <div class="study-actions">
            <button class="btn primary" type="button" onclick="speakLecture('summary')">要点を読み上げ</button>
            <button class="btn" type="button" onclick="stopSpeaking()">停止</button>
          </div>
          <div id="lecture-status" class="status"></div>
          <div id="exam-summary" class="exam-summary">保存済みの試験要点を読み込んでいます。</div>
        </div>
      </div>
      <div class="card pdf-card">
        <div class="date-title">
          <div><h2>図・計算・作図のPDF</h2><div class="sub" id="pdf-caption">図形や式はPDFで確認します。</div></div>
          <span class="badge" id="pdf-count">0件</span>
        </div>
        <div class="material-tabs" id="pdf-tabs"></div>
        <div class="viewer" id="pdf-viewer"><div class="empty">PDFリンクが登録されると、ここに表示します。</div></div>
        <div class="setup-details">
          <h2>教材をアップロード</h2>
          <div class="sub">PDFとテキストを選ぶだけです。リンク登録は不要です。</div>
          <label class="upload-box" for="material-files">
            PDF・TXT・Markdownをここへ追加
            <input type="file" id="material-files" accept=".pdf,.txt,.md,application/pdf,text/plain,text/markdown" multiple hidden>
          </label>
          <div class="hint">ファイル名に講義番号を入れると自動対応します。例：`001_試験要点.txt`、`001_図解.pdf`。番号なしPDFは全講義共通で表示します。</div>
          <div id="upload-status" class="status" style="margin-top:8px"></div>
          <div id="upload-list" class="upload-list"></div>
        </div>
      </div>
    </section>
  </div>
</main>
<script>
const START_DATE='2026-06-20';
const TOTAL_LECTURES=169;
let DB={};
let GOALS={};
let selectedDate='';
let currentLectureNumber=null;
let currentLectureSummary='';
let localMaterials=[];
let currentPdfUrl='';

function localDateString(date=new Date()){
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function parseDate(value){const [y,m,d]=value.split('-').map(Number);return new Date(y,m-1,d)}
function formatJP(value){const d=parseDate(value);return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`}
function escapeHTML(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function getDay(value){if(!DB[value])DB[value]={c:{},v:{}};return DB[value]}

function studyIndex(value){
  const start=parseDate(START_DATE);
  const target=parseDate(value);
  if(target<start)return -1;
  let count=0;
  const cursor=new Date(start);
  while(cursor<target){
    if(cursor.getDay()!==0)count++;
    cursor.setDate(cursor.getDate()+1);
  }
  return count;
}
function assignmentFor(value){
  const date=parseDate(value);
  const index=studyIndex(value);
  if(index<0)return {type:'before',videos:[]};
  if(date.getDay()===0)return {type:'review',videos:[]};
  const first=index*2+1;
  if(first>TOTAL_LECTURES)return {type:'questions',videos:[]};
  return {type:'lecture',videos:[first,Math.min(first+1,TOTAL_LECTURES)].filter((n,i,a)=>a.indexOf(n)===i)};
}
function taskDefinitions(assignment){
  if(assignment.type==='review')return [
    ['career_survey_theory','45分','今週の講義を総復習','曖昧なテーマを3つ説明できる状態にする'],
    ['career_survey_text','15分','文書問題・法規を確認','1テーマを読み直す'],
    ['career_survey_questions','30分','過去問28問','時間を測って解く'],
    ['career_error_log','10分','誤答分析','原因を知識・計算・読解に分類']
  ];
  if(assignment.type==='questions')return [
    ['career_survey_theory','15分','弱点講義の再視聴','弱点を1テーマ潰す'],
    ['career_survey_text','10分','文書問題・法規','1テーマ確認'],
    ['career_survey_questions','30分','過去問14問','正答率75%以上'],
    ['career_error_log','5分','誤答分析','翌日の復習対象を決める']
  ];
  if(assignment.type==='before')return [['career_error_log','10分','準備日','教材リンクを登録する']];
  const label=assignment.videos.map(n=>String(n).padStart(3,'0')).join('・');
  return [
    ['career_survey_theory','20分',`講義 ${label} の試験要点`,'問われる点・数字・公式・ひっかけを読む'],
    ['career_survey_text','15分','図・計算・作図のPDF','対応する図表と計算例だけを確認'],
    ['career_survey_questions','20分','2024過去問 上・下巻','10問解いて正答数を確認'],
    ['career_error_log','5分','間違い直し','誤答を1問以上復習']
  ];
}
function parseVideoLinks(){
  const result={};
  let automaticNumber=1;
  String(GOALS.studyVideoLinks||'').split(/\r?\n/).forEach(line=>{
    const value=line.trim();
    if(!value)return;
    const match=value.match(/^(\d{1,3})\s+(.+)$/);
    if(match){
      result[Number(match[1])]=match[2].trim();
      automaticNumber=Math.max(automaticNumber,Number(match[1])+1);
    }else if(/^https?:\/\//i.test(value)){
      while(result[automaticNumber])automaticNumber++;
      result[automaticNumber++]=value;
    }
  });
  return result;
}
function parsePdfLinks(){
  const lectures=assignmentFor(selectedDate).videos;
  return localMaterials
    .filter(item=>item.kind==='pdf'&&(item.lectureNumber==null||lectures.includes(item.lectureNumber)))
    .map(item=>({name:item.name,id:item.id,type:'pdf'}));
}
function drivePreview(url){
  const youtube=String(url).match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{6,})/);
  if(youtube)return `https://www.youtube.com/embed/${youtube[1]}`;
  const match=String(url).match(/\/d\/([a-zA-Z0-9_-]+)/)||String(url).match(/[?&]id=([a-zA-Z0-9_-]+)/);
  return match?`https://drive.google.com/file/d/${match[1]}/preview`:url;
}
function materialsFor(value){
  const assignment=assignmentFor(value);
  return assignment.videos.map(number=>({
    name:`講義 ${String(number).padStart(3,'0')}`,
    type:'video',
    number
  }));
}
function render(){
  const day=getDay(selectedDate);
  const assignment=assignmentFor(selectedDate);
  const tasks=taskDefinitions(assignment);
  const done=tasks.filter(([id])=>day.c[id]).length;
  const pct=Math.round(done/tasks.length*100);
  const typeLabel={lecture:'講義1周目',review:'週次復習日',questions:'過去問期',before:'準備期間'}[assignment.type];
  document.getElementById('schedule-card').innerHTML=`
    <div class="date-title"><div><h2>${formatJP(selectedDate)}</h2><div class="sub">${assignment.type==='lecture'?`対象講義：${assignment.videos.map(n=>String(n).padStart(3,'0')).join(' / ')}`:'新規講義はありません'}</div></div><span class="badge">${typeLabel}</span></div>
    <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
    <div class="sub" style="text-align:right">${done}/${tasks.length} 完了</div>
    ${tasks.map(([id,time,label,target])=>`<label class="task"><input type="checkbox" ${day.c[id]?'checked':''} onchange="toggleTask('${id}',this.checked)"><span><b>${escapeHTML(label)}</b><span>${escapeHTML(target)}</span></span><span class="time">${time}</span></label>`).join('')}`;
  document.getElementById('study-note').value=day.v.studyNote||'';
}
function renderMaterials(){
  const materials=materialsFor(selectedDate);
  const pdfs=parsePdfLinks();
  const tabs=document.getElementById('material-tabs');
  document.getElementById('material-count').textContent=`${materials.length}講義`;
  tabs.innerHTML=materials.map((item,index)=>`<button class="tab${index===0?' active':''}" onclick="showMaterial(${index})">${escapeHTML(item.name)}</button>`).join('');
  window.currentMaterials=materials;
  if(materials.length)showMaterial(0);
  else{
    document.getElementById('viewer-caption').textContent='対象教材なし';
    currentLectureNumber=null;
    currentLectureSummary='';
    document.getElementById('lecture-tools-title').textContent='本日の要点';
    document.getElementById('exam-summary').textContent='この日は新しい講義がありません。復習または過去問に取り組みます。';
  }
  const pdfTabs=document.getElementById('pdf-tabs');
  document.getElementById('pdf-count').textContent=`${pdfs.length}件`;
  pdfTabs.innerHTML=pdfs.map((item,index)=>`<button class="tab${index===0?' active':''}" onclick="showPdf(${index})">${escapeHTML(item.name)}</button>`).join('');
  window.currentPdfs=pdfs;
  if(pdfs.length)showPdf(0);
  else document.getElementById('pdf-viewer').innerHTML='<div class="empty">PDFが未登録です。図形・公式・作図資料の共有リンクだけを教材管理欄へ登録してください。</div>';
}
function showMaterial(index){
  const item=window.currentMaterials[index];
  document.querySelectorAll('#material-tabs .tab').forEach((tab,i)=>tab.classList.toggle('active',i===index));
  document.getElementById('viewer-caption').textContent=item.name;
  if(item.number){
    loadLectureNote(item.number,item.name);
  }
}
async function showPdf(index){
  const item=window.currentPdfs[index];
  document.querySelectorAll('#pdf-tabs .tab').forEach((tab,i)=>tab.classList.toggle('active',i===index));
  document.getElementById('pdf-caption').textContent=item.name;
  const record=await getMaterialRecord(item.id);
  if(currentPdfUrl)URL.revokeObjectURL(currentPdfUrl);
  currentPdfUrl=record?.blob?URL.createObjectURL(record.blob):'';
  document.getElementById('pdf-viewer').innerHTML=currentPdfUrl
    ? `<iframe src="${escapeHTML(currentPdfUrl)}" loading="lazy"></iframe>`
    : '<div class="empty">PDFを読み込めませんでした。</div>';
}
async function loadLectureNote(number,title){
  currentLectureNumber=number;
  currentLectureSummary='';
  document.getElementById('lecture-tools-title').textContent=`講義 ${String(number).padStart(3,'0')} 試験で問われる点`;
  document.getElementById('exam-summary').textContent='保存済みデータを読み込んでいます。';
  setLectureStatus('');
  try{
    const response=await fetch(`/api/study/lecture/${number}`);
    if(!response.ok)throw new Error(`HTTP ${response.status}`);
    const data=await response.json();
    if(currentLectureNumber!==number)return;
    currentLectureSummary=await getLocalLectureText(number)||data.lecture?.exam_summary||'';
    document.getElementById('exam-summary').textContent=currentLectureSummary||'この講義の試験要点はまだありません。`001_試験要点.txt`のようなファイルを下から追加してください。';
  }catch{
    if(currentLectureNumber!==number)return;
    const cached=getCachedLecture(number);
    currentLectureSummary=cached.examSummary||await getLocalLectureText(number)||'';
    document.getElementById('exam-summary').textContent=currentLectureSummary||'この講義の試験要点はまだありません。`001_試験要点.txt`のようなファイルを下から追加してください。';
  }
}
function lectureCacheKey(number){return `study_lecture_${number}`}
function getCachedLecture(number){
  try{return JSON.parse(localStorage.getItem(lectureCacheKey(number))||'{}')}catch{return {}}
}
function speakLecture(){
  if(!('speechSynthesis' in window)){setLectureStatus('このブラウザは読み上げに対応していません。',true);return}
  const text=currentLectureSummary;
  if(!text){setLectureStatus('先に講義番号入りのテキスト教材を追加してください。',true);return}
  speechSynthesis.cancel();
  const utterance=new SpeechSynthesisUtterance(text);
  utterance.lang='ja-JP';
  utterance.rate=1;
  speechSynthesis.speak(utterance);
  setLectureStatus('試験ポイントを読み上げています。');
}
function stopSpeaking(){
  if('speechSynthesis' in window)speechSynthesis.cancel();
  setLectureStatus('読み上げを停止しました。');
}
function setLectureStatus(message,error=false){
  const el=document.getElementById('lecture-status');
  el.textContent=message;
  el.classList.toggle('warning',error);
}
async function saveDay(){
  localStorage.setItem('hrtrack_db_cache',JSON.stringify(DB));
  const day=getDay(selectedDate);
  const response=await fetch('/api/day',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:selectedDate,checks:day.c,vitals:day.v})});
  if(!response.ok)throw new Error(`HTTP ${response.status}`);
}
async function toggleTask(id,checked){
  getDay(selectedDate).c[id]=checked;
  try{await saveDay();setStatus('保存しました')}catch{setStatus('端末内に保存しました',true)}
  render();
}
async function saveNote(){
  getDay(selectedDate).v.studyNote=document.getElementById('study-note').value;
  try{await saveDay();setStatus('学習記録を保存しました')}catch{setStatus('端末内に保存しました',true)}
}
function openMaterialDB(){
  return new Promise((resolve,reject)=>{
    const request=indexedDB.open('health-study-materials',1);
    request.onupgradeneeded=()=>request.result.createObjectStore('materials',{keyPath:'id'});
    request.onsuccess=()=>resolve(request.result);
    request.onerror=()=>reject(request.error);
  });
}
async function putMaterial(record){
  const db=await openMaterialDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction('materials','readwrite');
    tx.objectStore('materials').put(record);
    tx.oncomplete=resolve;
    tx.onerror=()=>reject(tx.error);
  });
}
async function getMaterialRecord(id){
  const db=await openMaterialDB();
  return new Promise((resolve,reject)=>{
    const request=db.transaction('materials').objectStore('materials').get(id);
    request.onsuccess=()=>resolve(request.result);
    request.onerror=()=>reject(request.error);
  });
}
async function getAllMaterials(){
  const db=await openMaterialDB();
  return new Promise((resolve,reject)=>{
    const request=db.transaction('materials').objectStore('materials').getAll();
    request.onsuccess=()=>resolve(request.result||[]);
    request.onerror=()=>reject(request.error);
  });
}
async function deleteMaterial(id){
  const db=await openMaterialDB();
  await new Promise((resolve,reject)=>{
    const tx=db.transaction('materials','readwrite');
    tx.objectStore('materials').delete(id);
    tx.oncomplete=resolve;
    tx.onerror=()=>reject(tx.error);
  });
  await loadLocalMaterials();
}
function deleteUploadedMaterial(encodedId){
  deleteMaterial(decodeURIComponent(encodedId));
}
function lectureNumberFromName(name){
  const match=String(name).match(/(?:^|\D)(\d{3})(?:\D|$)/);
  const number=match?Number(match[1]):null;
  return number>=1&&number<=TOTAL_LECTURES?number:null;
}
async function handleMaterialFiles(files){
  const accepted=[...files].filter(file=>/\.pdf$|\.(txt|md)$/i.test(file.name));
  if(!accepted.length){setUploadStatus('PDF、TXT、Markdownファイルを選択してください。',true);return}
  setUploadStatus(`${accepted.length}件を保存しています。`);
  try{
    for(const file of accepted){
      const kind=/\.pdf$/i.test(file.name)?'pdf':'text';
      const id=`${file.name}-${file.size}-${file.lastModified}`;
      await putMaterial({
        id,
        name:file.name,
        kind,
        lectureNumber:lectureNumberFromName(file.name),
        text:kind==='text'?await file.text():'',
        blob:kind==='pdf'?file:null,
        size:file.size,
        updatedAt:new Date().toISOString()
      });
    }
    await loadLocalMaterials();
    setUploadStatus(`${accepted.length}件を保存しました。すぐ学習に使えます。`);
  }catch(error){setUploadStatus(`保存に失敗しました：${error.message}`,true)}
}
async function loadLocalMaterials(){
  try{
    localMaterials=await getAllMaterials();
    localMaterials.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
    renderUploadList();
    renderMaterials();
  }catch(error){setUploadStatus(`教材を読み込めませんでした：${error.message}`,true)}
}
async function getLocalLectureText(number){
  const item=localMaterials.find(material=>material.kind==='text'&&material.lectureNumber===number);
  return item?.text||'';
}
function renderUploadList(){
  const el=document.getElementById('upload-list');
  if(!el)return;
  if(!localMaterials.length){el.innerHTML='<div class="hint">アップロード済み教材はありません。</div>';return}
  el.innerHTML=localMaterials.map(item=>`<div class="upload-item">
    <span class="badge">${item.kind==='pdf'?'PDF':'文字'}</span>
    <span class="upload-item-name">${escapeHTML(item.name)}${item.lectureNumber?`（講義${String(item.lectureNumber).padStart(3,'0')}）`:'（共通）'}</span>
    <button type="button" onclick="deleteUploadedMaterial('${encodeURIComponent(item.id)}')">削除</button>
  </div>`).join('');
}
function setUploadStatus(message,error=false){
  const el=document.getElementById('upload-status');
  el.textContent=message;
  el.classList.toggle('warning',error);
}
function setStatus(message,error=false){
  const el=document.getElementById('sync-status');
  el.textContent=message;
  el.classList.toggle('warning',error);
  setTimeout(()=>el.textContent='',3500);
}
function moveDate(amount){const d=parseDate(selectedDate);d.setDate(d.getDate()+amount);setDate(localDateString(d))}
function selectToday(){setDate(localDateString())}
function setDate(value){selectedDate=value;document.getElementById('study-date').value=value;history.replaceState(null,'',`?date=${value}`);render()}
async function init(){
  try{
    const response=await fetch('/api/data');
    if(!response.ok)throw new Error();
    const data=await response.json();
    DB=data.db||{};
    GOALS=data.goals||{};
  }catch{
    try{DB=JSON.parse(localStorage.getItem('hrtrack_db_cache')||'{}')}catch{}
    try{GOALS=JSON.parse(localStorage.getItem('hrtrack_goals_cache')||'{}')}catch{}
    setStatus('オフラインデータを表示しています',true);
  }
  const requested=new URLSearchParams(location.search).get('date');
  setDate(/^\d{4}-\d{2}-\d{2}$/.test(requested||'')?requested:localDateString());
  document.getElementById('study-date').addEventListener('change',event=>setDate(event.target.value));
  const fileInput=document.getElementById('material-files');
  fileInput.addEventListener('change',event=>handleMaterialFiles(event.target.files));
  const uploadBox=document.querySelector('.upload-box');
  uploadBox.addEventListener('dragover',event=>event.preventDefault());
  uploadBox.addEventListener('drop',event=>{event.preventDefault();handleMaterialFiles(event.dataTransfer.files)});
  await loadLocalMaterials();
}
init();
</script>
</body>
</html>
